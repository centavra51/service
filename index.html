<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ремонт в Кишиневе 24/7 | Сантехник, электрик, плиточник</title>
  <meta
    name="description"
    content="Ремонт в Кишиневе 24/7: сантехник, электрик, плиточник и другие работы. Быстрый выезд и честная смета."
  />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header class="container header">
    <strong class="brand">Repair24/7</strong>
    <button id="langToggle" class="btn-outline" type="button" aria-label="Switch language">RO</button>
  </header>

  <main class="container">
    <section class="hero">
      <p class="eyebrow" data-i18n="eyebrow">Кишинев и пригород</p>
      <h1 data-i18n="hero">Мы ваша команда ремонта в Кишиневе: услуги 24/7</h1>
      <p data-i18n="sub">
        Сантехника, электрика, плитка, покраска, полы. Быстрый выезд и честная смета.
      </p>
      <a class="btn" href="#contact" data-i18n="cta">Оставить заявку</a>
    </section>

    <section class="grid">
      <article>
        <h2 data-i18n="quiz">Калькулятор стоимости</h2>
        <div class="card">
          <label for="qService" data-i18n="service">Тип услуги</label>
          <select id="qService" name="serviceType">
            <option value="plumbing" data-i18n-option="plumbing">Сантехника</option>
            <option value="electrical" data-i18n-option="electrical">Электрика</option>
            <option value="tiling" data-i18n-option="tiling">Плитка</option>
          </select>

          <label for="qAmount" data-i18n="amount">Площадь / точки / метры</label>
          <input id="qAmount" type="number" min="1" value="10" inputmode="numeric" />

          <button id="calcBtn" class="btn" type="button" data-i18n="calc">Рассчитать</button>
          <p id="calcResult" class="result" aria-live="polite"></p>
        </div>
      </article>

      <article id="contact">
        <h2 data-i18n="contact">Форма заявки</h2>
        <form id="leadForm" class="card">
          <input required name="name" autocomplete="name" data-i18n-placeholder="namePlaceholder" placeholder="Имя / Nume" />
          <input required name="phone" autocomplete="tel" data-i18n-placeholder="phonePlaceholder" placeholder="Телефон / Telefon" />
          <input required name="address" autocomplete="street-address" data-i18n-placeholder="addressPlaceholder" placeholder="Адрес / Adresa" />
          <input required name="service" id="serviceField" data-i18n-placeholder="servicePlaceholder" placeholder="Услуга" />
          <textarea name="description" rows="4" data-i18n-placeholder="descriptionPlaceholder" placeholder="Описание"></textarea>
          <button id="submitBtn" class="btn" type="submit" data-i18n="send">Отправить</button>
          <p id="formStatus" class="status" aria-live="polite"></p>
        </form>
      </article>
    </section>
  </main>

  <script src="/script.js" defer></script>
</body>
</html>
